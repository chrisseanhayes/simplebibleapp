#https://docs.docker.com/compose/extends/
services:
  nginx:
    image: nginx:1.15-alpine
    depends_on:
      - sbaweb
    restart: unless-stopped
    volumes:
      - ./nginx/data/nginx:/etc/nginx/conf.d
      - ./nginx/data/certbot/conf:/etc/letsencrypt
      - ./nginx/data/certbot/www:/var/www/certbot
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
      - "44343:44343"
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"
  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - ./nginx/data/certbot/conf:/etc/letsencrypt
      - ./nginx/data/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
  sbaweb:
    build: ./simplebibleapp
    depends_on:
      - sbaredis
    ports:
      - '5001:8080'
    environment:
      - ConnectionStrings__Redis=sbaredis:6379
      - DataplanePath=/app/dataplane
    volumes:
      - ~/.gemini:/root/.gemini
      - ./dataplane:/app/dataplane
  sbaredis:
    image: "redis:alpine"
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'